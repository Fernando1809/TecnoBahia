<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tecno Bahía – Inicio</title>
  <meta name="color-scheme" content="light dark" />
  <script>
    (function () {
      try {
        var k = 'tecno-bahia-theme';
        var t = localStorage.getItem(k);
        if (t !== 'dark' && t !== 'light') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    :root{
      --blue-700: #0d6efd;
      --blue-800: #084298;
      --bg: #eef1f5;
      --tile-bg: #ffffff;
      --tile-text: #111827;
      --tile-shadow: rgba(20, 30, 60, 0.06);
      --tile-shadow-hover: rgba(20, 30, 60, 0.12);
      --header-grad-a: var(--blue-700);
      --header-grad-b: #0a5ff0;
      --card-radius: 12px;
    }

    html[data-theme="dark"] {
      --blue-700: #5eb0ff;
      --blue-800: #2563c4;
      --bg: #12151c;
      --tile-bg: #1e2430;
      --tile-text: #e8eaed;
      --tile-shadow: rgba(0, 0, 0, 0.35);
      --tile-shadow-hover: rgba(0, 0, 0, 0.5);
      --header-grad-a: #1a4a9e;
      --header-grad-b: #0d2850;
    }

    html,body{
      height: 100%;
      margin: 0;
      background: var(--bg);
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* HEADER */
    header {
      background: linear-gradient(180deg, var(--header-grad-a), var(--header-grad-b));
      color: white;
      display:flex;
      align-items:center;
      gap: 12px;
      padding: 10px 18px;
      box-shadow: 0 2px 6px rgba(13,110,253,0.12);
      border-bottom: 3px solid var(--blue-800);
    }
    header img{
      height: 50px;
      width: auto;
      display:block;
    }
    header .brand {
      display:flex;
      flex-direction:column;
      gap:2px;
      line-height:1;
    }
    header h1{
      margin:0;
      font-size:18px;
      font-weight:700;
      letter-spacing:0.2px;
    }
    header p{
      margin:0;
      font-size:12px;
      opacity:0.95;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.18);
      color: white;
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
      transition: background .15s ease;
    }

    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.28);
    }

    .theme-toggle:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.85);
      outline-offset: 2px;
    }

    /* MAIN GRID */
    main {
      min-height: calc(100vh - 76px); 
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 20px;
      box-sizing:border-box;
    }

    .grid {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: repeat(4, 1fr); 
      gap: 14px;
      align-content: center;
      grid-auto-rows: minmax(110px, auto);
    }

    /* Tarjeta / tile */
    .tile {
      background: var(--tile-bg);
      border-radius: var(--card-radius);
      box-shadow: 0 6px 18px var(--tile-shadow);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding: 15px 10px;
      text-align:center;
      transition: transform .15s ease, box-shadow .15s ease;
      cursor: pointer;
      user-select: none;
      text-decoration: none;
    }
    .tile:hover{
      transform: translateY(-6px);
      box-shadow: 0 12px 28px var(--tile-shadow-hover);
    }

    .tile .icon {
      font-size: 34px;
      color: var(--blue-700);
      margin-bottom: 8px;
      line-height:1;
    }
    .tile .title {
      font-size: 13px;
      font-weight: 600;
      color: var(--tile-text);
      margin:0;
      text-transform: uppercase;
    }

    a { color: inherit; }

    /* RESPONSIVE */
    @media (max-width: 1100px){
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 800px){
      .grid { grid-template-columns: repeat(2, 1fr); }
      header h1{ font-size:16px; }
    }
    @media (max-width: 480px){
      .grid { grid-template-columns: repeat(1, 1fr); }
      main { padding: 10px; }
      header img{ height:44px; }
    }

  </style>
</head>
<body>

      <a class="tile" href="https://empresas.kolo-app.com/distribucion/increase" target="_blank" rel="noopener">

      <a class="tile" href="https://empresas.kolo-app.com/distribucion/increase/nuevo/false" target="_blank" rel="noopener">

    </div>
  </main>

  <script>
    (function initThemeToggle() {
      var KEY = 'tecno-bahia-theme';
      var root = document.documentElement;
      var btn = document.getElementById('themeToggle');
      var icon = document.getElementById('themeToggleIcon');
      if (!btn || !icon) return;

      function applyTheme(theme) {
        root.setAttribute('data-theme', theme);
        try {
          localStorage.setItem(KEY, theme);
        } catch (e) {}
        var dark = theme === 'dark';
        icon.className = 'bi ' + (dark ? 'bi-sun-fill' : 'bi-moon-stars-fill');
        btn.title = dark ? 'Modo claro' : 'Modo oscuro';
        btn.setAttribute('aria-label', dark ? 'Activar modo claro' : 'Activar modo oscuro');
      }

      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(next);
      });

      var current = root.getAttribute('data-theme');
      if (current !== 'dark' && current !== 'light') {
        current = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      applyTheme(current);
    })();
  </script>
