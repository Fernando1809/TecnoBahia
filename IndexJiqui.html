<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tecno Bahía – Inicio</title>
  <meta name="color-scheme" content="light dark" />
  <script>
    (function () {
      try {
        var k = 'tecno-bahia-theme';
        var t = localStorage.getItem(k);
        if (t !== 'dark' && t !== 'light') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    :root{
      --blue-700: #0d6efd;
      --blue-800: #084298;
      --bg: #eef1f5;
      --tile-bg: #ffffff;
      --tile-text: #111827;
      --tile-shadow: rgba(20, 30, 60, 0.06);
      --tile-shadow-hover: rgba(20, 30, 60, 0.12);
      --header-grad-a: var(--blue-700);
      --header-grad-b: #0a5ff0;
      --dropdown-bg: #ffffff;
      --dropdown-text: #111827;
      --dropdown-border: #eef1f5;
      --dropdown-hover-bg: #f3f6fb;
      --card-radius: 12px;
    }

    html[data-theme="dark"] {
      --blue-700: #5eb0ff;
      --blue-800: #2563c4;
      --bg: #12151c;
      --tile-bg: #1e2430;
      --tile-text: #e8eaed;
      --tile-shadow: rgba(0, 0, 0, 0.35);
      --tile-shadow-hover: rgba(0, 0, 0, 0.5);
      --header-grad-a: #1a4a9e;
      --header-grad-b: #0d2850;
      --dropdown-bg: #252d3d;
      --dropdown-text: #e8eaed;
      --dropdown-border: #2d3548;
      --dropdown-hover-bg: #2d3548;
    }

    html,body{
      height: 100%;
      margin: 0;
      background: var(--bg);
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* HEADER */
    header {
      background: linear-gradient(180deg, var(--header-grad-a), var(--header-grad-b));
      color: white;
      display:flex;
      align-items:center;
      gap: 12px;
      padding: 10px 18px;
      box-shadow: 0 2px 6px rgba(13,110,253,0.12);
      border-bottom: 3px solid var(--blue-800);
    }
    header img{
      height: 50px;
      width: auto;
      display:block;
    }
    header .brand {
      display:flex;
      flex-direction:column;
      gap:2px;
      line-height:1;
    }
    header h1{
      margin:0;
      font-size:18px;
      font-weight:700;
      letter-spacing:0.2px;
    }
    header p{
      margin:0;
      font-size:12px;
      opacity:0.95;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-selector {
      position: relative;
      display: inline-block;
    }

    .user-selector-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.18);
      color: white;
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
      transition: background .15s ease;
    }

    .user-selector-btn:hover {
      background: rgba(255, 255, 255, 0.28);
    }

    .user-selector-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--dropdown-bg);
      border-radius: var(--card-radius);
      box-shadow: 0 12px 28px var(--tile-shadow-hover);
      z-index: 100;
      overflow: hidden;
      flex-direction: column;
      min-width: 150px;
    }

    .user-selector-dropdown.open {
      display: flex;
    }

    .user-selector-dropdown a {
      display: block;
      padding: 12px 14px;
      text-decoration: none;
      color: var(--dropdown-text);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      border-bottom: 1px solid var(--dropdown-border);
      cursor: pointer;
    }

    .user-selector-dropdown a:last-child {
      border-bottom: none;
    }

    .user-selector-dropdown a:hover {
      background: var(--dropdown-hover-bg);
      color: var(--blue-700);
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.18);
      color: white;
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
      transition: background .15s ease;
    }

    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.28);
    }

    .theme-toggle:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.85);
      outline-offset: 2px;
    }

    /* MAIN GRID: usamos la clase .grid para mantener coherencia con tu HTML */
    main {
      height: calc(100vh - 76px); /* evita scroll si header ~76px */
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
      box-sizing:border-box;
    }

    .grid {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 4 columnas en escritorio */
      grid-template-rows: repeat(2, minmax(90px, 1fr)); /* 2 filas */
      gap: 14px;
      align-content: center;
      /* aseguramos que los items no crezcan demasiado */
      grid-auto-rows: minmax(90px, 1fr);
    }

    /* Tarjeta / tile */
    .tile {
      background: var(--tile-bg);
      border-radius: var(--card-radius);
      box-shadow: 0 6px 18px var(--tile-shadow);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding: 10px;
      text-align:center;
      transition: transform .15s ease, box-shadow .15s ease;
      cursor: pointer;
      user-select: none;
      min-height: 98px;
    }
    .tile:hover{
      transform: translateY(-6px);
      box-shadow: 0 12px 28px var(--tile-shadow-hover);
    }

    .tile .icon {
      font-size: 34px;
      color: var(--blue-700);
      margin-bottom: 8px;
      line-height:1;
    }
    .tile .title {
      font-size: 14px;
      font-weight: 600;
      color: var(--tile-text);
      text-decoration: none;
      margin:0;
    }

    a { color: inherit; }

    .tile-dropdown-wrap {
      position: relative;
      min-height: 98px;
    }

    .tile-dropdown-wrap > .tile {
      width: 100%;
      height: 100%;
      min-height: 98px;
      box-sizing: border-box;
    }

    .ai-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--dropdown-bg);
      border-radius: var(--card-radius);
      box-shadow: 0 12px 28px var(--tile-shadow-hover);
      z-index: 100;
      overflow: hidden;
      flex-direction: column;
    }

    .ai-dropdown.open {
      display: flex;
    }

    .ai-dropdown a {
      display: block;
      padding: 12px 14px;
      text-decoration: none;
      color: var(--dropdown-text);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      border-bottom: 1px solid var(--dropdown-border);
    }

    .ai-dropdown a:last-child {
      border-bottom: none;
    }

    .ai-dropdown a:hover {
      background: var(--dropdown-hover-bg);
      color: var(--blue-700);
    }

    /* RESPONSIVE: adaptamos columnas */
    @media (max-width: 1100px){
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 800px){
      .grid { grid-template-columns: repeat(2, 1fr); }
      header h1{ font-size:16px; }
    }
    @media (max-width: 480px){
      .grid { grid-template-columns: repeat(1, 1fr); }
      main { padding: 10px; }
      header img{ height:44px; }
    }

  </style>
</head>
<body>

  <header>
    <img src="TecnoBahia.jpeg" alt="Tecno Bahía">
    <div class="brand">
      <h1>Tecno Bahía</h1>
      <p>Panel principal</p>
    </div>
    <div class="header-actions">
      <div class="user-selector">
        <button type="button" class="user-selector-btn" id="userSelectorBtn" title="Cambiar usuario" aria-label="Cambiar usuario">
          <i class="bi bi-person-circle" aria-hidden="true"></i>
        </button>
        <div class="user-selector-dropdown" id="userSelectorDropdown">
          <a href="IndexUsu.html">USULUTAN</a>
          <a href="ADMON.html" onclick="handleAdminAccess(event)">ADMIN</a>
        </div>
      </div>
      <button type="button" class="theme-toggle" id="themeToggle" title="Modo oscuro" aria-label="Activar modo oscuro">
        <i class="bi bi-moon-stars-fill" id="themeToggleIcon" aria-hidden="true"></i>
      </button>
      <img src="SW.jpeg" alt="Sherwin Williams" style="height:40px;">
    </div>
  </header>

  <main>
    <div class="grid">
      <!-- Mantengo los enlaces EXACTOS que subiste en tu CSV -->
      <a class="tile" href="https://empresas.kolo-app.com/" target="_blank" rel="noopener">
        <div class="icon"><i class="bi bi-house-door-fill"></i></div>
        <div class="title">KOLO</div>
      </a>

      <a class="tile" href="https://empresas.kolo-app.com/distribucion/clientes" target="_blank" rel="noopener">
        <div class="icon"><i class="bi bi-people-fill"></i></div>
        <div class="title">CLIENTES</div>
      </a>

      <a class="tile" href="https://empresas.kolo-app.com/distribucion/clientes/nuevo" target="_blank" rel="noopener">
        <div class="icon"><i class="bi bi-person-plus-fill"></i></div>
        <div class="title">NUEVO CLIENTE</div>
      </a>

      <a class="tile" href="https://empresas.kolo-app.com/distribucion/cotizaciones/false/nueva" target="_blank" rel="noopener">
        <div class="icon"><i class="bi bi-receipt-cutoff"></i></div>
        <div class="title"> NUEVA COTIZACIÓN</div>
      </a>


      <div class="tile-dropdown-wrap">
        <div class="tile" id="aiMenuTrigger" role="button" tabindex="0" aria-expanded="false" aria-haspopup="true"
          aria-controls="aiDropdown">
          <div class="icon"><i class="bi bi-robot"></i></div>
          <div class="title">AI's</div>
        </div>
        <div class="ai-dropdown" id="aiDropdown" role="menu">
          <a href="https://chatgpt.com/" target="_blank" rel="noopener" role="menuitem">ChatGPT</a>
          <a href="https://chat.deepseek.com/" target="_blank" rel="noopener" role="menuitem">DeepSeek</a>
          <a href="https://gemini.google.com/" target="_blank" rel="noopener" role="menuitem">Gemini</a>
          <a href="https://grok.com/" target="_blank" rel="noopener" role="menuitem">Grok</a>
          <a href="https://claude.ai/" target="_blank" rel="noopener" role="menuitem">Claude</a>
          <a href="https://www.perplexity.ai/" target="_blank" rel="noopener" role="menuitem">Perplexity</a>
        </div>
      </div>
      <a class="tile" href="https://www.google.com/?zx=1763576256312&no_sw_cr=1" target="_blank" rel="noopener">
        <div class="icon"><i class="bi bi-google"></i></div>
        <div class="title">GOOGLE</div>
      </a>
      <a class="tile" href="https://canva.link/mv8jhzsmmmrgfxu" target="_blank" rel="noopener">
        <div class="icon"><i class="bi bi-file-earmark-richtext"></i></div>
        <div class="title">PROMOCIONES VIGENTES</div>
      </a>
      <a class="tile" href="https://canva.link/m88tw5d3s96uwck" target="_blank" rel="noopener">
        <div class="icon"><i class="bi bi-file-earmark-richtext-fill"></i></div>
        <div class="title">MANUAL DE VENTAS</div>
      </a>
    </div>
  </main>

  <script>
    function handleAdminAccess(event) {
      event.preventDefault();
      const password = prompt('Ingrese la contraseña para acceder a ADMIN:');
      if (password === '987654321') {
        window.location.href = 'ADMON.html';
      } else if (password !== null) {
        alert('Contraseña incorrecta');
      }
    }

    (function initUserSelector() {
      const btn = document.getElementById('userSelectorBtn');
      const dropdown = document.getElementById('userSelectorDropdown');
      if (!btn || !dropdown) return;

      function setOpen(open) {
        dropdown.classList.toggle('open', open);
      }

      function toggle(e) {
        e.stopPropagation();
        setOpen(!dropdown.classList.contains('open'));
      }

      btn.addEventListener('click', toggle);
      btn.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setOpen(!dropdown.classList.contains('open'));
        } else if (e.key === 'Escape') {
          setOpen(false);
        }
      });

      document.addEventListener('click', function () {
        setOpen(false);
      });

      dropdown.addEventListener('click', function (e) {
        e.stopPropagation();
      });
    })();

    (function initThemeToggle() {
      var KEY = 'tecno-bahia-theme';
      var root = document.documentElement;
      var btn = document.getElementById('themeToggle');
      var icon = document.getElementById('themeToggleIcon');
      if (!btn || !icon) return;

      function applyTheme(theme) {
        root.setAttribute('data-theme', theme);
        try {
          localStorage.setItem(KEY, theme);
        } catch (e) {}
        var dark = theme === 'dark';
        icon.className = 'bi ' + (dark ? 'bi-sun-fill' : 'bi-moon-stars-fill');
        btn.title = dark ? 'Modo claro' : 'Modo oscuro';
        btn.setAttribute('aria-label', dark ? 'Activar modo claro' : 'Activar modo oscuro');
      }

      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(next);
      });

      var current = root.getAttribute('data-theme');
      if (current !== 'dark' && current !== 'light') {
        current = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      applyTheme(current);
    })();

    (function () {
      const trigger = document.getElementById('aiMenuTrigger');
      const dropdown = document.getElementById('aiDropdown');
      if (!trigger || !dropdown) return;

      function setOpen(open) {
        dropdown.classList.toggle('open', open);
        trigger.setAttribute('aria-expanded', open ? 'true' : 'false');
      }

      function toggle(e) {
        e.stopPropagation();
        setOpen(!dropdown.classList.contains('open'));
      }

      trigger.addEventListener('click', toggle);
      trigger.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setOpen(!dropdown.classList.contains('open'));
        } else if (e.key === 'Escape') {
          setOpen(false);
        }
      });

      document.addEventListener('click', function () {
        setOpen(false);
      });

      dropdown.addEventListener('click', function (e) {
        e.stopPropagation();
      });
    })();
  </script>

</body>
</html>
